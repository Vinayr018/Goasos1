    .page-loader{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0a1628;transition:opacity .5s ease,visibility .5s ease}
    .page-loader.loaded{opacity:0;visibility:hidden;pointer-events:none}
    .loader-ring{width:48px;height:48px;border:3px solid rgba(0,167,248,.2);border-top-color:#00a7f8;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>

<body>
  <div class="page-loader" id="page-loader"><div class="loader-ring"></div></div>
  <app-root></app-root>
  <script>window.addEventListener('load',function(){var l=document.getElementById('page-loader');if(l)l.classList.add('loaded')});</script>
</body>
